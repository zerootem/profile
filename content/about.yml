title: "نبذة عني"
description: "تعرف على رحلتي كمطور واجهات ومؤسس موقع ModWeeb، وشغفي بتصميم تجارب المستخدم ودمج تقنيات الذكاء الاصطناعي."
content: |
  مرحباً، أنا **محمد الذاهبي**، مؤسس وصاحب موقع **ModWeeb (مود ويب)**. منذ أكثر من 6 سنوات، وأنا غارق في عالم تطوير المواقع وتصميم الواجهات، حيث أركز على بناء تجارب رقمية ليست وظيفية فحسب، بل بديهية وجذابة للمستخدمين.

  بدأت رحلتي العملية بشغف كبير لفهم تقنيات الويب، وسرعان ما تطور هذا الشغف ليشمل تصميم واجهات المستخدم وتجربة المستخدم. أؤمن بأن أفضل المنتجات الرقمية تولد من تكامل عميق بين التصميم الإبداعي والتنفيذ التقني المتقن.

  ### فلسفتي في التصميم

  فلسفتي في التصميم تقوم على **التعاطف مع المستخدم** و**حل المشكلات**. أعتقد أن التصميم العظيم يبدأ بفهم "لماذا" – احتياجات المستخدمين، دوافعهم، ونقاط الألم لديهم. أستخدم البحث، والنماذج الأولية المتكررة (غالباً باستخدام أدوات مثل Figma)، واختبار المستخدم لضمان فعالية الحلول التي أقدمها.

  أسعى دائماً لإنشاء واجهات تشعر المستخدم بالسلاسة، حيث تعمل الوظائف والجماليات بتناغم تام. سواء كنت أصمم واجهات مثالية بالبكسل أو أكتب أكواداً نظيفة باستخدام Vue.js/Nuxt.js، فإن هدفي الأساسي هو تقديم قيمة حقيقية للمستخدم النهائي.

  ### ما يحركني

  ما يبقيني متحمساً لهذا العمل هو التعلم المستمر والتحدي المتمثل في ترجمة الأفكار المعقدة إلى حلول بسيطة وأنيقة. لا شيء يضاهي شعور رؤية تصميم ما يتحول إلى واقع ملموس، ومعرفة أنه يجعل التفاعل الرقمي لأي شخص أسهل أو أكثر متعة.

  ### طموحي مع ModWeeb والذكاء الاصطناعي

  بصفتي مؤسس ModWeeb، أسعى لتقديم محتوى تقني متميز باللغة العربية، وأعمل حالياً على دمج أدوات الذكاء الاصطناعي في خدماتي ومنصتي. أرى في الذكاء الاصطناعي مستقبل التجارب الرقمية المخصصة، وأطمح لأن أكون في طليعة من يقدمون هذه الحلول للمستخدم العربي.

  ### خارج الشاشة

  عندما لا أكون منغمساً في التصميم أو البرمجة، قد تجدني أستكشف أحدث المقاهي في مدينتي، أو أقرأ في كتب التقنية والابتكار، أو أساهم في بعض المشاريع مفتوحة المصدر.

  شكراً لزيارتك. لا تتردد في تصفح [مشاريعي](/projects) أو [التواصل معي](/#contact) إذا كنت ترغب بالتعاون!
