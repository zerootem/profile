title: "منصة ModWeeb التعليمية والتقنية"
description: "صممت وطورت منصة تعليمية وتقنية متكاملة ضمن موقع ModWeeb، تهدف إلى تقديم محتوى عربي متميز في مجال تطوير الواجهات وتجربة المستخدم والذكاء الاصطناعي. ركزت في التصميم على سهولة الوصول للمحتوى، وتحسين تجربة المتعلم، مع توفير أدوات تفاعلية تعزز الفهم والتطبيق العملي."
