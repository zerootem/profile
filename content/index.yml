blog:
  title: "آخر المقالات"
  description: "بعض من أفكاري وكتاباتي التقنية الأخيرة"
faq:
  title: "الأسئلة الشائعة"
  description: "إجابات على الأسئلة الأكثر تكراراً حول خدماتي ومجال عملي"
  categories:
    - title: "خدماتي ومجالات العمل"
      questions:
        - label: "ما هي الخدمات التي تقدمها؟"
          content: |
            أتخصص في تقديم خدمات تطوير الواجهات الأمامية، تصميم تجربة المستخدم، واستشارات دمج الذكاء الاصطناعي في المواقع والتطبيقات. كما أقدم خدمات إنشاء المدونات التقنية وإدارة المحتوى الرقمي، بالإضافة إلى تطوير مواقع الويب المتجاوبة باستخدام أحدث التقنيات مثل Vue.js و Nuxt.js.
        - label: "كيف يمكنني الاستفادة من خبرتك في الذكاء الاصطناعي؟"
          content: |
            يمكنني مساعدتك في دمج أدوات وتطبيقات الذكاء الاصطناعي في منصتك الرقمية، مثل تحسين محركات البحث بالذكاء الاصطناعي، أتمتة المحتوى، تحليل بيانات المستخدمين، أو تطوير واجهات تفاعلية ذكية. كل ذلك مع الحفاظ على تجربة مستخدم سلسة وجذابة.
        - label: "هل تعمل مع المشاريع الناشئة؟"
          content: |
            بالتأكيد! لدي شغف خاص بالعمل مع المشاريع الناشئة والشركات الصغيرة لمساعدتها على بناء هوية رقمية قوية. أقدم حلولاً مرنة تناسب ميزانياتها، مع التركيز على تحقيق نمو فعّال من خلال التصميم الجيد والتقنيات الحديثة.
    - title: "التسعير والجداول الزمنية"
      questions:
        - label: "كم تكلفة المشروع عادةً؟"
          content: |
            تختلف تكلفة المشاريع حسب النطاق والتعقيدات والميزات المطلوبة. تبدأ مشاريعي الشاملة في تطوير الواجهات وتصميم تجربة المستخدم من $3,000، وتتراوح المشاريع المتوسطة بين $5,000 و$15,000. للاستشارات التقنية أو المهام التصميمية المحددة، أتقاضى سعراً بالساعة أو باليوم حسب الاتفاق.
        - label: "ما هي شروط الدفع؟"
          content: |
            أطلب عادةً دفعة مقدمة بنسبة 40% لبدء العمل، على أن يتم دفع الرصيد المتبقي (60%) عند الانتهاء من المشروع بشكل كامل. أقبل الدفع عبر التحويل البنكي وبعض منصات الدفع الإلكترونية حسب الاتفاق.
        - label: "كم يستغرق تنفيذ المشروع عادةً؟"
          content: |
            تعتمد المدة الزمنية على حجم المشروع ومدى تعقيده. المشاريع الصغيرة قد تستغرق 3-4 أسابيع، بينما المشاريع الأكبر قد تمتد من شهرين إلى أربعة أشهر. أقدم دائماً تقديراً زمنياً مفصلاً بعد مرحلة الاستكشاف الأولية.
        - label: "هل تقدم عقود صيانة شهرية؟"
          content: |
            نعم، أقدم عقود صيانة ودعم فني شهرية للعملاء الذين يحتاجون تحديثات مستمرة، تطوير ميزات جديدة، أو دعم تقني مستمر. هذه العقود تُخصص حسب احتياجات كل عميل. يمكننا مناقشة التفاصيل إذا كنت مهتماً بهذا الخيار.
    - title: "عن ModWeeb والرؤية التقنية"
      questions:
        - label: "ما الذي ألهمك لتأسيس ModWeeb؟"
          content: |
            كان الدافع الأساسي هو شغفي العميق بتطوير المواقع وتصميم الواجهات، ورغبتي في تقديم محتوى تقني عربي متميز يلبي احتياجات المستخدمين. رأيت فرصة لإنشاء منصة تجمع بين الخبرات التقنية، التصميم الإبداعي، واستكشاف تقنيات المستقبل مثل الذكاء الاصطناعي.
        - label: "كيف ترى مستقبل دمج الذكاء الاصطناعي في المواقع؟"
          content: |
            أعتقد أن الذكاء الاصطناعي سيكون جزءاً لا يتجزأ من أي منصة رقمية ناجحة في المستقبل القريب. سيمكننا من تقديم تجارب مستخدم أكثر تخصيصاً وذكاءً. أنا أعمل حاليًا على دمج هذه التقنيات في ModWeeb لتقديم أدوات وخدمات متطورة، وأرى أن التحدي الحقيقي هو في الجمع بين قوة الذكاء الاصطناعي وسلاسة التصميم وجودة تجربة المستخدم.
