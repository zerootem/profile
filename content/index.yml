faq:
  title: "الأسئلة الشائعة"
  description: "إجابات عن أكثر ما يسأل عنه العملاء حول خدماتي ومنهجيتي."
  categories:
    - title: "الخدمات والتخصص"
      questions:
        - label: "ما هي الخدمات التي تقدمها؟"
          content: |
            أتخصص في:
            - تطوير وتخصيص قوالب Blogger (Blogspot) بشكل احترافي.
            - بناء واجهات ويب تفاعلية باستخدام HTML، CSS، JavaScript، وReact.
            - تطوير أدوات ويب مخصصة (SEO، مولدات، محولات صيغ).
            - دمج خدمات الذكاء الاصطناعي وواجهات API في التطبيقات.
            - تحسين أداء المواقع وسرعة التحميل وإعدادات SEO.
            - إدارة النطاقات وتهيئة DNS مع Cloudflare.
        - label: "كيف تعمل منهجيتك في المشاريع؟"
          content: |
            أعتمد على نهج واضح: فهم متطلبات العميل، تصميم هيكل تقني قابل للتوسع، تطوير كود نظيف ومعياري، ثم الاختبار والتحسين المستمر. أركز على التوثيق الجيد وسهولة الصيانة لضمان استمرارية المشروع بعد التسليم.
        - label: "هل تعمل مع الشركات الناشئة؟"
          content: |
            بالتأكيد، أسعد بالتعاون مع الشركات الناشئة وأصحاب الأفكار الجديدة، حيث أساعدهم في بناء منتجاتهم الرقمية من الصفر أو تطوير منصاتهم الحالية بأقل التكاليف وأعلى جودة.
    - title: "التكاليف والمواعيد"
      questions:
        - label: "كم تبلغ تكلفة المشروع التقريبي؟"
          content: |
            تختلف التكلفة حسب نطاق المشروع وتعقيده، تبدأ مشاريعي من $2,000 للمشاريع البسيطة (مثل تطوير قالب أو أداة واحدة)، وتصل إلى $15,000 للمشاريع المتكاملة (منصات متعددة الخدمات). أقدّم عروضاً مفصّلة بعد دراسة المتطلبات.
        - label: "ما هي شروط الدفع؟"
          content: |
            أطلب دفعة مقدمة بنسبة 40% لبدء العمل، والـ 60% المتبقية عند الانتهاء من المشروع وتسليمه. أقبل الدفع عبر التحويل البنكي أو PayPal.
        - label: "كم يستغرق المشروع النموذجي؟"
          content: |
            المشاريع الصغيرة (قالب أو أداة) تستغرق من 2 إلى 4 أسابيع، بينما المشاريع الأكبر (منصات متكاملة) قد تمتد من 2 إلى 4 أشهر، مع تقديم جدول زمني واضح في بداية التعاقد.
        - label: "هل تقدم عقود صيانة دورية؟"
          content: |
            نعم، أقدّم حزم صيانة شهرية تشمل التحديثات الأمنية، تحسين الأداء، وإضافة ميزات بسيطة حسب الاتفاق. يمكن تخصيص العقد حسب احتياجات العميل.
    - title: "عن محمد الذاهبي"
      questions:
        - label: "ما الذي يدفعك في عملك؟"
          content: |
            شغفي هو تحويل الأفكار إلى منتجات رقمية حقيقية ومفيدة. أحب حل المشكلات التقنية المعقدة بطرق إبداعية، وتحقيق توازن بين الجمال البصري وسرعة الأداء. رؤيتي هي تمكين منشئي المحتوى من أدوات ذكية تسهل عملهم وتوسع تأثيرهم.
        - label: "ما هي اهتماماتك خارج البرمجة؟"
          content: |
            أتابع باستمرار مستجدات التقنية والذكاء الاصطناعي، وأهوى كتابة المحتوى التقني، إضافة إلى استكشاف حلول جديدة في مجال تحسين محركات البحث. في أوقات الفراغ، أمارس التصوير الفوتوغرافي وأستمتع بالموسيقى الهادئة.
