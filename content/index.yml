about:
  title: "نبذة عني"
  description: |
    أنا محمد الذاهبي، مؤسس وصاحب مدونة Modweeb (مود ويب)، حيث أكرس وقتي لتطوير محتوى تقني متميز وتجارب مستخدم فائقة الجودة.
    
    شغفي الأساسي ينصب في تصميم واجهات المستخدم وتجربة المستخدم، وأسعى دائماً لتقديم حلول رقمية مبتكرة تجمع بين الجماليات والوظائف العملية.
    
    بالإضافة إلى ذلك، لدي اهتمام كبير بالذكاء الاصطناعي وأدواته، وأعمل حالياً على دمج هذه التقنيات في موقعي وخدماتي لتقديم قيمة مضافة للمستخدمين.
    
    أؤمن بأن المستقبل الرقمي يكمن في التكامل الذكي بين التصميم الإبداعي والتقنيات المتطورة، وهذا ما أسعى لتحقيقه من خلال مشاريعي.
