about:
  title: "نبذة عني"
  description: |
    مطور ويب ومؤسس منصة **ModWeeb**، أتخصص في بناء وتخصيص منصات التدوين (خاصة Blogger)، وتطوير واجهات أمامية تفاعلية باستخدام HTML، CSS، JavaScript، وReact. 
    أمتلك خبرة عملية في تحسين أداء المواقع، تهيئة النطاقات وإعدادات DNS، وإدارة الأمان عبر Cloudflare. أعمل على دمج واجهات برمجة التطبيقات وخدمات الذكاء الاصطناعي لتقديم أدوات ويب مبتكرة مثل محسنات SEO، مولدات ملفات، ومحولات صيغ. 
    منهجيتي تقوم على البنية النظيفة، قابلية التوسع، وتجربة مستخدم سلسة وسريعة.
